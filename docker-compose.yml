services:
  postgres:
    image: postgres:16
    container_name: publish-db
    environment:
      POSTGRES_DB: publishdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    image: iamberkesahin/publish-management:latest 
    container_name: publish-app
    depends_on:
      - postgres
    ports:
      - "80:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/publishdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    restart: always

volumes:
  pgdata: