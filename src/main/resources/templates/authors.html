<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Authors</title>
</head>
<body>
    <h1>Authors</h1>

    <a href="/">Home</a>

    <h2>Add Author</h2>
    <form th:action="@{/authors}" th:object="${author}" method="post">
        <label>Name:</label>
        <input type="text" th:field="*{name}" required>
        <br><br>

        <label>Address:</label>
        <input type="text" th:field="*{address}">
        <br><br>

        <button type="submit">Save Author</button>
    </form>

    <h2>Author List</h2>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Address</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="author : ${authors}">
                <td th:text="${author.id}"></td>
                <td th:text="${author.name}"></td>
                <td th:text="${author.address}"></td>
                <td>
                    <a th:href="@{/authors/delete/{id}(id=${author.id})}">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
