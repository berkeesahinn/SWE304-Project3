<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Authors - Publish Management</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; }
        .card { background-color: #1e1e1e; border: 1px solid #333; }
        .table { color: #e0e0e0; }
    </style>
</head>
<body class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="text-primary">Authors</h1>
        <a href="/" class="btn btn-outline-secondary">Home</a>
    </div>

    <!-- Add Author Section -->
    <div class="card p-4 mb-5 shadow">
        <h2 class="h4 mb-3">Add New Author DENEMEEEEEEEE</h2>
        <form th:action="@{/authors}" th:object="${author}" method="post" class="row g-3">
            <div class="col-md-5">
                <label class="form-label">Name:</label>
                <input type="text" th:field="*{name}" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <div class="col-md-5">
                <label class="form-label">Address:</label>
                <input type="text" th:field="*{address}" class="form-control bg-dark text-white border-secondary">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-success w-100">Save Author</button>
            </div>
        </form>
    </div>

    <!-- Author List Section -->
    <div class="card p-4 shadow">
        <h2 class="h4 mb-3">Author List</h2>
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Address</th>
                    <th class="text-center">Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="author : ${authors}">
                    <td th:text="${author.id}"></td>
                    <td th:text="${author.name}" class="fw-bold text-info"></td>
                    <td th:text="${author.address}"></td>
                    <td class="text-center">
                        <a th:href="@{/authors/delete/{id}(id=${author.id})}" class="btn btn-sm btn-danger">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
