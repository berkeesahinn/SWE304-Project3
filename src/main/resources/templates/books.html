<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Books - Publish Management</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 15px; }
        .table { color: #e0e0e0; border-color: #333; }
        .table-hover tbody tr:hover { background-color: #2c2c2c; color: #fff; }
        .btn-primary { background-color: #0d6efd; border: none; }
        .btn-primary:hover { background-color: #0b5ed7; }
        .form-control { background-color: #2b2b2b; border: 1px solid #444; color: #fff; }
        .form-control:focus { background-color: #333; border-color: #0d6efd; color: #fff; box-shadow: none; }
        .form-label { font-weight: 500; color: #aaa; }
    </style>
</head>
<body class="container py-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h1 class="display-5 fw-bold text-primary">Books</h1>
        <a href="/" class="btn btn-outline-light px-4">Home</a>
    </div>

    <!-- Add Book Card -->
    <div class="card shadow-lg p-4 mb-5">
        <h2 class="h4 mb-4 text-white">Add New Book</h2>
        <form th:action="@{/books}" th:object="${book}" method="post" class="row g-3">
            <div class="col-md-5">
                <label class="form-label">Book Title</label>
                <input type="text" th:field="*{title}" class="form-control" placeholder="Enter book title" required>
            </div>
            <div class="col-md-5">
                <label class="form-label">Publisher</label>
                <input type="text" th:field="*{publisher}" class="form-control" placeholder="Enter publisher name">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Save Book</button>
            </div>
        </form>
    </div>

    <!-- Book List Card -->
    <div class="card shadow-lg p-4">
        <h2 class="h4 mb-4 text-white">Book Inventory</h2>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th scope="col" style="width: 10%">ID</th>
                        <th scope="col" style="width: 40%">Title</th>
                        <th scope="col" style="width: 30%">Publisher</th>
                        <th scope="col" scope="col" class="text-center" style="width: 20%">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="book : ${books}">
                        <td th:text="${book.id}" class="text-secondary"></td>
                        <td th:text="${book.title}" class="fw-bold text-info"></td>
                        <td th:text="${book.publisher}"></td>
                        <td class="text-center">
                            <a th:href="@{/books/delete/{id}(id=${book.id})}" 
                               class="btn btn-outline-danger btn-sm px-3"
                               onclick="return confirm('Are you sure?')">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <!-- List empty state -->
        <div th:if="${#lists.isEmpty(books)}" class="text-center py-4 text-secondary">
            <p>No books found in the inventory.</p>
        </div>
    </div>

</body>
</html>
