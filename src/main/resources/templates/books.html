<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Books - Publish Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
        .card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 15px; }
        .table { color: #e0e0e0; border-color: #333; }
        .table-hover tbody tr:hover { background-color: #2c2c2c; }
        .form-control { background-color: #2b2b2b; border: 1px solid #444; color: #fff; }
    </style>
</head>
<body class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h1 class="display-5 fw-bold text-primary">Books</h1>
        <a href="/" class="btn btn-outline-light">Home</a>
    </div>

    <div class="card shadow-lg p-4 mb-5">
        <h2 class="h4 mb-4 text-white">Add New Book</h2>
        <form th:action="@{/books}" th:object="${book}" method="post" class="row g-3">
            <div class="col-md-5">
                <label class="form-label">Book Title</label>
                <!-- BURASI: title oldu -->
                <input type="text" th:field="*{title}" class="form-control" placeholder="Enter book title" required>
            </div>
            <div class="col-md-5">
                <label class="form-label">Publisher</label>
                <input type="text" th:field="*{publisher}" class="form-control" placeholder="Enter publisher name">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-primary w-100 fw-bold">Save Book</button>
            </div>
        </form>
    </div>

    <div class="card shadow-lg p-4">
        <h2 class="h4 mb-4 text-white">Book Inventory</h2>
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Publisher</th>
                    <th class="text-center">Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="book : ${books}">
                    <td th:text="${book.id}"></td>
                    <!-- BURASI: book.title oldu -->
                    <td th:text="${book.title}" class="fw-bold text-info"></td>
                    <td th:text="${book.publisher}"></td>
                    <td class="text-center">
                        <a th:href="@{/books/delete/{id}(id=${book.id})}" class="btn btn-outline-danger btn-sm">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
