<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Publishes - Publish Management</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
        .card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 15px; }
        .table { color: #e0e0e0; border-color: #333; }
        .table-hover tbody tr:hover { background-color: #2c2c2c; color: #fff; }
        .form-control, .form-select { background-color: #2b2b2b; border: 1px solid #444; color: #fff; }
        .form-control:focus, .form-select:focus { background-color: #333; border-color: #0d6efd; color: #fff; box-shadow: none; }
        .form-label { font-weight: 500; color: #aaa; }
    </style>
</head>
<body class="container py-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h1 class="display-5 fw-bold text-primary">Publish Records</h1>
        <a href="/" class="btn btn-outline-light px-4">Home</a>
    </div>

    <!-- Add Publish Record Card -->
    <div class="card shadow-lg p-4 mb-5">
        <h2 class="h4 mb-4 text-white">Create New Publication</h2>
        <form th:action="@{/publishes}" method="post" class="row g-3">
            <div class="col-md-3">
                <label class="form-label">Author</label>
                <select name="authorId" class="form-select" required>
                    <option value="">Select Author</option>
                    <option th:each="author : ${authors}"
                            th:value="${author.id}"
                            th:text="${author.name}">
                    </option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Book</label>
                <select name="bookId" class="form-select" required>
                    <option value="">Select Book</option>
                    <option th:each="book : ${books}"
                            th:value="${book.id}"
                            th:text="${book.title}">
                    </option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Publish Date</label>
                <input type="date" name="publishDate" class="form-control" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Edition</label>
                <input type="number" name="edition" class="form-control" placeholder="No." required>
            </div>
            <div class="col-md-1 d-flex align-items-end">
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Save</button>
            </div>
        </form>
    </div>

    <!-- Publish List Card -->
    <div class="card shadow-lg p-4">
        <h2 class="h4 mb-4 text-white">Publication Logs</h2>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th style="width: 10%">ID</th>
                        <th style="width: 25%">Author</th>
                        <th style="width: 25%">Book</th>
                        <th style="width: 20%">Date</th>
                        <th style="width: 10%">Edition</th>
                        <th class="text-center" style="width: 10%">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="publish : ${publishes}">
                        <td th:text="${publish.id}" class="text-secondary"></td>
                        <td th:text="${publish.author.name}" class="fw-bold"></td>
                        <td th:text="${publish.book.title}" class="text-info"></td>
                        <td th:text="${publish.publishDate}"></td>
                        <td><span class="badge bg-secondary" th:text="${publish.edition + '. Edition'}"></span></td>
                        <td class="text-center">
                            <a th:href="@{/publishes/delete/{id}(id=${publish.id})}" 
                               class="btn btn-outline-danger btn-sm"
                               onclick="return confirm('Delete this record?')">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
